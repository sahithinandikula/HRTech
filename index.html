<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Stitch Dashboard</title>
    <style>
      .preloader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.05), transparent 30%), #f7f9fb;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Inter', sans-serif;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      .preloader-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2.5rem;
        background: #ffffff;
        border: 1px solid rgba(229, 231, 235, 0.8);
        border-radius: 24px;
        box-shadow: 0 10px 30px -10px rgba(148, 163, 184, 0.15), 0 1px 3px rgba(0, 0, 0, 0.02);
        width: 280px;
      }
      .preloader-logo-wrap {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px -4px rgba(37, 99, 235, 0.3);
        animation: pulseLogo 2s infinite ease-in-out;
        margin-bottom: 1.25rem;
      }
      .preloader-title {
        font-size: 1.25rem;
        font-weight: 800;
        color: #111827;
        letter-spacing: -0.02em;
        margin-bottom: 1.5rem;
      }
      .preloader-spinner-track {
        width: 120px;
        height: 4px;
        background: #e5e7eb;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .preloader-spinner-bar {
        width: 40px;
        height: 100%;
        background: linear-gradient(90deg, #2563eb, #4f46e5);
        border-radius: 2px;
        position: absolute;
        animation: loadingSlide 1.4s infinite ease-in-out;
      }
      @keyframes pulseLogo {
        0%, 100% { transform: scale(1); box-shadow: 0 8px 20px -4px rgba(37, 99, 235, 0.3); }
        50% { transform: scale(1.06); box-shadow: 0 12px 28px -2px rgba(37, 99, 235, 0.45); }
      }
      @keyframes loadingSlide {
        0% { left: -40px; }
        100% { left: 120px; }
      }
    </style>
  </head>
  <body class="bg-slate-950">
    <div id="root">
      <div id="preloader" class="preloader-container" aria-label="Loading Stitch Dashboard" role="status">
        <div class="preloader-card">
          <div class="preloader-logo-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="36" height="36">
              <path d="M9 16 C 9 11, 15 11, 16 16 C 17 21, 23 21, 23 16 C 23 11, 17 11, 16 16 C 15 21, 9 21, 9 16 Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="9" cy="16" r="2.5" fill="#38bdf8" />
              <circle cx="23" cy="16" r="2.5" fill="#38bdf8" />
              <circle cx="16" cy="16" r="2" fill="#ffffff" />
            </svg>
          </div>
          <div class="preloader-title">Stitch</div>
          <div class="preloader-spinner-track">
            <div class="preloader-spinner-bar"></div>
          </div>
        </div>
      </div>
      <script>
        setTimeout(() => {
          const preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.style.opacity = '0';
            setTimeout(() => preloader.remove(), 400);
          }
        }, 2000);
      </script>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
  </html>
